root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/main ./cmd"
entrypoint = "./tmp/main"
include_ext = ["go"]
include_dir = ["cmd", "internal"]
exclude_dir = ["tmp", "bin", "cmd/static"]
kill_delay = 300 # ms — let Go release the port before restart

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true