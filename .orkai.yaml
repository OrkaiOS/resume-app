# .orkai.yaml — project configuration for Orkai
# See: orkai index --help
project:
    name: resume-app
    category_id: 233276ae31223e19a727667e45c51d19
index:
    type: all
    path: .
    code:
        skip_tests: true
    documents:
        extensions:
            - .md
            - .pdf
            - .docx
    analytics:
        enabled: true
        paths:
            - .
        extensions:
            - .csv
            - .xlsx
            - .parquet
        validation:
            require_header: true
            min_rows: 1
            max_columns: 0
        fallback: skip
review:
    git: {}
    processes:
        - path: .orkai/review/backend.yaml
        - path: .orkai/review/frontend.yaml
    reports:
        enabled: true
        directory: .orkai/reports
        retention:
            max_reports: 100
            max_days: 30
        include_in_gitignore: true
